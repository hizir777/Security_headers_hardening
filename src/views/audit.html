<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Header Audit</title>
    <link rel="stylesheet" href="/public/css/theme.css" />
    <link rel="stylesheet" href="/public/css/main.css" />
    <link rel="stylesheet" href="/public/css/components.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <span class="brand-mark">SHH</span>
        <span class="brand-name">Secure Web Template</span>
      </div>
      <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/audit">Live Audit</a>
      </nav>
    </header>

    <main class="container">
      <h1>Live header audit</h1>
      <p>
        Click <em>Run audit</em> to fetch <code>/readyz</code> and compare the
        emitted response headers against the policy declared in
        <code>src/config/headers.js</code>.
      </p>
      <button id="run-audit" class="btn btn-primary">Run audit</button>
      <table class="audit-table" id="audit-table" aria-live="polite">
        <thead>
          <tr><th>Header</th><th>Present</th><th>Value</th><th>Status</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </main>

    <footer class="site-footer">
      <p>&copy; Istinye University &mdash; Secure Web Development</p>
    </footer>

    <script nonce="__CSP_NONCE__" src="/public/js/audit-ui.js"></script>
  </body>
</html>
